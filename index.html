<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTracker | Fleet Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bg-pattern { background-color: #fafaf9; background-image: radial-gradient(#e7e5e4 1px, transparent 1px); background-size: 24px 24px; }
        .flash-red { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0%, 100% { background-color: transparent; } 50% { background-color: #fee2e2; } }
    </style>
</head>
<body class="bg-pattern min-h-screen text-stone-900">

    <div id="app" class="w-full min-h-screen p-4 sm:p-8">
        <!-- AUTHENTICATION -->
        <div v-if="!isLoggedIn" class="flex items-center justify-center min-h-[80vh]">
            <div class="bg-white p-8 rounded-3xl shadow-2xl border border-stone-200 max-w-sm w-full">
                <h1 class="text-3xl font-extrabold text-center mb-8">OTracker</h1>
                <div class="space-y-4">
                    <div v-if="!isLoginMode">
                        <label class="block text-xs font-bold uppercase text-stone-500 mb-1">Full Name</label>
                        <input type="text" v-model="authName" class="w-full px-4 py-3 border border-stone-200 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-stone-500 mb-1">Phone Number</label>
                        <div class="flex">
                            <select v-model="selectedCountryCode" class="px-2 py-3 border border-stone-200 border-r-0 rounded-l-xl bg-stone-50 text-sm">
                                <option value="+234">NG (+234)</option><option value="+233">GH (+233)</option>
                                <option value="+27">ZA (+27)</option><option value="+254">KE (+254)</option>
                            </select>
                            <input type="tel" v-model="localPhoneNumber" placeholder="8022833007" class="flex-1 px-4 py-3 border border-stone-200 rounded-r-xl">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-stone-500 mb-1">Password</label>
                        <input type="password" v-model="authPassword" class="w-full px-4 py-3 border border-stone-200 rounded-xl">
                    </div>
                </div>
                <button @click="handleAuth" class="w-full mt-6 bg-stone-900 text-white py-3 rounded-xl font-bold hover:bg-black">{{ isLoginMode ? 'Login' : 'Create Account' }}</button>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div v-else>
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-4xl font-extrabold">OTracker</h1>
                    <p class="text-stone-500">Welcome, {{ currentUser.name }}</p>
                </div>
                <div class="flex gap-2">
                    <button @click="showCarModal = true" class="bg-stone-900 text-white px-5 py-2.5 rounded-xl font-bold">+ Vehicle</button>
                    <button @click="logout" class="px-5 py-2.5 border rounded-xl font-bold text-stone-600">Logout</button>
                </div>
            </header>

            <!-- METRICS -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-10">
                <div class="bg-white p-6 rounded-3xl border border-stone-200 shadow-sm">
                    <p class="text-stone-500 text-xs font-bold uppercase">Vehicles</p>
                    <p class="text-3xl font-extrabold">{{ cars.length }}</p>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-stone-200 shadow-sm">
                    <p class="text-stone-500 text-xs font-bold uppercase">Documents</p>
                    <p class="text-3xl font-extrabold">{{ documents.length }}</p>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-stone-200 shadow-sm">
                    <p class="text-stone-500 text-xs font-bold uppercase">Action Required</p>
                    <p class="text-3xl font-extrabold text-red-600">{{ actionRequiredCount }}</p>
                </div>
            </div>

            <!-- VEHICLES -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div v-for="car in cars" :key="car.id" class="bg-white p-6 rounded-3xl shadow-sm border border-stone-200">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-xl font-bold">{{ car.name }}</h3>
                            <p class="text-sm text-stone-500 font-mono">{{ car.plate_number }}</p>
                        </div>
                        <button @click="deleteCar(car.id)" class="text-red-400 hover:text-red-600 text-xs">Delete</button>
                    </div>
                    <ul class="space-y-2 mb-4">
                        <li v-for="doc in getCarDocs(car.id)" :key="doc.id" 
                            :class="['text-xs p-2 rounded-lg flex justify-between items-center', isExpiring(doc.expiry_date) ? 'flash-red border border-red-200' : 'bg-stone-50']">
                            <span>{{ doc.type }} — <strong>{{ doc.expiry_date }}</strong></span>
                            <button @click="deleteDoc(doc.id)" class="text-stone-400 hover:text-stone-600">×</button>
                        </li>
                    </ul>
                    <button @click="openDocModal(car.id)" class="text-stone-900 font-bold text-sm bg-stone-100 px-4 py-2 rounded-xl w-full">+ Add Document</button>
                </div>
            </div>

            <!-- MODALS -->
            <div v-if="showCarModal || showDocModal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                <div class="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl">
                    <h3 class="text-lg font-bold mb-4">{{ showCarModal ? 'Add Vehicle' : 'Add Document' }}</h3>
                    <template v-if="showCarModal">
                        <input type="text" v-model="newCar.name" placeholder="Car Name" class="w-full p-3 mb-2 border rounded-xl">
                        <input type="text" v-model="newCar.plate" placeholder="Plate Number" class="w-full p-3 mb-4 border rounded-xl">
                    </template>
                    <template v-else>
                        <input type="text" v-model="newDoc.type" placeholder="Doc Type" class="w-full p-3 mb-2 border rounded-xl">
                        <input type="date" v-model="newDoc.expiry" class="w-full p-3 mb-4 border rounded-xl">
                    </template>
                    <div class="flex gap-2">
                        <button @click="showCarModal = false; showDocModal = false" class="flex-1 py-2 border rounded-xl">Cancel</button>
                        <button @click="showCarModal ? submitCar() : submitDoc()" class="flex-1 py-2 bg-stone-900 text-white rounded-xl">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
       const SUPABASE_URL = 'https://qxbwixpeuutmvxngxxos.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_So__v5k60AWVKzg8V_WjLw_EcKyyvxg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const { createApp, ref, computed } = Vue;
        createApp({
            setup() {
                const isLoggedIn = ref(false);
                const isLoginMode = ref(true);
                const authName = ref('User');
                const authPassword = ref('');
                const selectedCountryCode = ref('+234');
                const localPhoneNumber = ref('');
                const currentUser = ref({ id: 1, name: 'User' });
                const cars = ref([]);
                const documents = ref([]);
                const showCarModal = ref(false);
                const showDocModal = ref(false);
                const activeCarId = ref(null);
                const newCar = ref({ name: '', plate: '' });
                const newDoc = ref({ type: '', expiry: '' });

                const actionRequiredCount = computed(() => documents.value.filter(d => isExpiring(d.expiry_date)).length);
                const isExpiring = (date) => {
                    const expiry = new Date(date);
                    const now = new Date();
                    return (expiry - now) / (1000 * 60 * 60 * 24) <= 30;
                };

                const handleAuth = () => isLoggedIn.value = true;
                const openDocModal = (id) => { activeCarId.value = id; showDocModal.value = true; };
                const getCarDocs = (id) => documents.value.filter(d => d.car_id === id);
                
                const submitCar = async () => {
                    if(!newCar.value.name) return;
                    cars.value.push({id: Date.now(), name: newCar.value.name, plate_number: newCar.value.plate});
                    showCarModal.value = false;
                };
                
                const submitDoc = async () => {
                    if(!newDoc.value.type || !activeCarId.value) return;
                    documents.value.push({id: Date.now(), car_id: activeCarId.value, type: newDoc.value.type, expiry_date: newDoc.value.expiry});
                    showDocModal.value = false;
                };

                const deleteCar = (id) => { if(confirm('Delete vehicle?')) cars.value = cars.value.filter(c => c.id !== id); };
                const deleteDoc = (id) => { if(confirm('Delete document?')) documents.value = documents.value.filter(d => d.id !== id); };
                const logout = () => window.location.reload();

                return { isLoggedIn, isLoginMode, handleAuth, authName, authPassword, selectedCountryCode, localPhoneNumber, currentUser, cars, documents, actionRequiredCount, isExpiring, showCarModal, showDocModal, newCar, newDoc, submitCar, submitDoc, openDocModal, getCarDocs, deleteCar, deleteDoc, logout };
            }
        }).mount('#app');
    </script>
</body>
</html>
