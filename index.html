<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTracker | Document Expiry Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            color: white;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .input-glass {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }
        .input-glass:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="auth-section" class="max-w-md mx-auto mt-20 glass-panel p-8">
        <h1 class="text-3xl font-bold mb-6 text-center tracking-wider">OTracker</h1>
        <div class="space-y-4">
            <input type="email" id="auth-email" placeholder="Email Address" class="w-full p-3 rounded input-glass">
            <input type="password" id="auth-password" placeholder="Password" class="w-full p-3 rounded input-glass">
            <div class="flex gap-4 mt-6">
                <button onclick="login()" class="flex-1 bg-blue-600 hover:bg-blue-700 p-3 rounded font-semibold transition">Log In</button>
                <button onclick="register()" class="flex-1 bg-gray-600 hover:bg-gray-700 p-3 rounded font-semibold transition">Register</button>
            </div>
            <p id="auth-msg" class="text-sm text-center text-red-400 mt-2 hidden"></p>
        </div>
    </div>

    <div id="dashboard-section" class="max-w-6xl mx-auto hidden">
        <div class="flex justify-between items-center mb-8 glass-panel p-4">
            <h1 class="text-2xl font-bold">OTracker Dashboard</h1>
            <div class="space-x-4">
                <button onclick="toggleProfileModal()" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded transition">Profile Settings</button>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded transition">Log Out</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-panel p-6">
                <h2 class="text-xl font-semibold mb-4 text-blue-300">Add New Vehicle</h2>
                <div class="space-y-3">
                    <input type="text" id="veh-make" placeholder="Make (e.g. Toyota)" class="w-full p-2 rounded input-glass">
                    <input type="text" id="veh-model" placeholder="Model (e.g. Camry)" class="w-full p-2 rounded input-glass">
                    <input type="text" id="veh-plate" placeholder="License Plate" class="w-full p-2 rounded input-glass">
                    <button onclick="addVehicle()" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded mt-2 transition">Save Vehicle</button>
                </div>
            </div>

            <div class="glass-panel p-6">
                <h2 class="text-xl font-semibold mb-4 text-green-300">Add Document Expiry</h2>
                <div class="space-y-3">
                    <select id="doc-vehicle-select" class="w-full p-2 rounded input-glass bg-gray-800 text-white">
                        <option value="">-- Select Vehicle --</option>
                    </select>
                    <input type="text" id="doc-type" placeholder="Document (e.g. Insurance, License)" class="w-full p-2 rounded input-glass">
                    <input type="date" id="doc-expiry" class="w-full p-2 rounded input-glass">
                    <button onclick="addDocument()" class="w-full bg-green-600 hover:bg-green-700 p-2 rounded mt-2 transition">Set Reminder</button>
                </div>
            </div>
        </div>

        <div class="mt-8 glass-panel p-6">
            <h2 class="text-xl font-semibold mb-4">Your Active Reminders</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-gray-600">
                            <th class="p-2">Vehicle</th>
                            <th class="p-2">Plate</th>
                            <th class="p-2">Document</th>
                            <th class="p-2">Expiry Date</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center hidden z-50">
        <div class="glass-panel p-8 max-w-md w-full relative">
            <button onclick="toggleProfileModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-xl">&times;</button>
            <h2 class="text-2xl font-bold mb-6 text-indigo-300">Profile Settings</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-300 mb-1">Account Email</label>
                    <input type="email" id="profile-email" disabled class="w-full p-2 rounded bg-gray-800 border border-gray-600 text-gray-400 cursor-not-allowed">
                </div>
                <div>
                    <label class="block text-sm text-gray-300 mb-1">WhatsApp Notification Number</label>
                    <input type="text" id="profile-whatsapp" placeholder="e.g. +2348000000000" class="w-full p-2 rounded input-glass">
                    <p class="text-xs text-gray-400 mt-1">Include country code. Twilio opt-in required.</p>
                </div>
                <button onclick="updateProfile()" class="w-full bg-indigo-600 hover:bg-indigo-700 p-2 rounded transition">Save Preferences</button>
            </div>

            <hr class="border-gray-600 my-6">

            <div class="p-4 border border-red-900 bg-red-900 bg-opacity-20 rounded-lg">
                <h3 class="text-red-400 font-bold mb-2">Danger Zone</h3>
                <p class="text-xs text-gray-400 mb-4">Permanently delete your account, vehicles, and documents. This cannot be undone.</p>
                <button onclick="deleteAccount()" class="w-full bg-red-600 hover:bg-red-700 p-2 rounded transition text-sm">Permanently Delete Account</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. UPDATE THESE THREE CONSTANTS
        // ==========================================
        const SUPABASE_URL = 'https://qxbwixpeuutmvxngxxos.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_So__v5k60AWVKzg8V_WjLw_EcKyyvxg';
        const RENDER_BACKEND_URL = 'https://otracker-e8xg.onrender.com';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;

        // ==========================================
        // 2. AUTHENTICATION
        // ==========================================
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                loadDashboardData();
                loadProfileData();
            } else {
                currentUser = null;
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('dashboard-section').classList.add('hidden');
            }
        });

        async function register() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const msg = document.getElementById('auth-msg');
            
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) {
                msg.textContent = error.message;
                msg.classList.remove('hidden');
            } else {
                msg.textContent = "Success! Please log in.";
                msg.classList.replace('text-red-400', 'text-green-400');
                msg.classList.remove('hidden');
            }
        }

        async function login() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const msg = document.getElementById('auth-msg');
            
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                msg.textContent = error.message;
                msg.classList.remove('hidden');
            }
        }

        async function logout() {
            await supabase.auth.signOut();
        }

        // ==========================================
        // 3. PROFILE SETTINGS & ACCOUNT DELETION
        // ==========================================
        function toggleProfileModal() {
            const modal = document.getElementById('profile-modal');
            modal.classList.toggle('hidden');
        }

        async function loadProfileData() {
            if (!currentUser) return;
            document.getElementById('profile-email').value = currentUser.email;

            const { data, error } = await supabase
                .from('profiles')
                .select('whatsapp_number')
                .eq('id', currentUser.id)
                .single();

            if (data && data.whatsapp_number) {
                document.getElementById('profile-whatsapp').value = data.whatsapp_number;
            }
        }

        async function updateProfile() {
            const newNumber = document.getElementById('profile-whatsapp').value;
            const { error } = await supabase
                .from('profiles')
                .update({ whatsapp_number: newNumber })
                .eq('id', currentUser.id);

            if (error) {
                alert("Failed to save: " + error.message);
            } else {
                alert("WhatsApp number saved successfully!");
                toggleProfileModal();
            }
        }

        async function deleteAccount() {
            const confirmDelete = confirm("Are you ABSOLUTELY sure? This deletes everything permanently.");
            if (!confirmDelete) return;

            try {
                const response = await fetch(`${RENDER_BACKEND_URL}/api/delete-account`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.id })
                });

                if (response.ok) {
                    alert("Your account and all associated data have been deleted.");
                    await supabase.auth.signOut();
                    toggleProfileModal();
                } else {
                    const errData = await response.json();
                    alert("Failed to delete account via backend: " + (errData.error || "Unknown error"));
                }
            } catch (err) {
                alert("Network error. Is your Render server running? " + err.message);
            }
        }

        // ==========================================
        // 4. DATABASE CRUD (Vehicles & Documents)
        // ==========================================
        async function loadDashboardData() {
            const { data: vehicles } = await supabase.from('vehicles').select('*').eq('user_id', currentUser.id);
            const select = document.getElementById('doc-vehicle-select');
            select.innerHTML = '<option value="">-- Select Vehicle --</option>'; 
            
            if (vehicles) {
                vehicles.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.id;
                    opt.textContent = `${v.make} ${v.model} (${v.license_plate})`;
                    select.appendChild(opt);
                });
            }

            const { data: documents } = await supabase
                .from('documents')
                .select('*, vehicles(make, model, license_plate)')
                .eq('user_id', currentUser.id)
                .order('expiry_date', { ascending: true });

            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';
            
            if (documents) {
                documents.forEach(doc => {
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-gray-700 bg-gray-800 bg-opacity-30";
                    tr.innerHTML = `
                        <td class="p-3">${doc.vehicles.make} ${doc.vehicles.model}</td>
                        <td class="p-3 text-gray-400">${doc.vehicles.license_plate}</td>
                        <td class="p-3">${doc.document_type}</td>
                        <td class="p-3 font-semibold text-yellow-400">${doc.expiry_date}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        async function addVehicle() {
            const make = document.getElementById('veh-make').value;
            const model = document.getElementById('veh-model').value;
            const plate = document.getElementById('veh-plate').value;

            if(!make || !model || !plate) return alert("Please fill all vehicle fields.");

            const { error } = await supabase.from('vehicles').insert([
                { user_id: currentUser.id, make, model, license_plate: plate }
            ]);

            if (error) alert(error.message);
            else {
                document.getElementById('veh-make').value = '';
                document.getElementById('veh-model').value = '';
                document.getElementById('veh-plate').value = '';
                loadDashboardData();
            }
        }

        async function addDocument() {
            const vehicleId = document.getElementById('doc-vehicle-select').value;
            const docType = document.getElementById('doc-type').value;
            const expiry = document.getElementById('doc-expiry').value;

            if(!vehicleId || !docType || !expiry) return alert("Please fill all document fields.");

            const { error } = await supabase.from('documents').insert([
                { user_id: currentUser.id, vehicle_id: vehicleId, document_type: docType, expiry_date: expiry }
            ]);

            if (error) alert(error.message);
            else {
                document.getElementById('doc-type').value = '';
                document.getElementById('doc-expiry').value = '';
                loadDashboardData();
            }
        }
    </script>
</body>
</html>
