<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTracker | Fleet Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Supabase JS Client -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @keyframes pulse-red { 0%, 100% { background-color: #fff; } 50% { background-color: #fee2e2; } }
        .flash-red { animation: pulse-red 2s infinite; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen text-stone-900 p-4 sm:p-8">

<div id="app" class="max-w-6xl mx-auto">
    <!-- AUTH SCREEN -->
    <div v-if="!user" class="flex justify-center mt-20">
        <div class="bg-white p-8 rounded-3xl shadow-xl border w-full max-w-sm">
            <h1 class="text-3xl font-extrabold text-center mb-6">OTracker</h1>
            <div class="space-y-4">
                <input v-model="phone" type="tel" placeholder="Phone Number (e.g. 802...)" class="w-full p-3 border rounded-xl">
                <input v-model="password" type="password" placeholder="Password" class="w-full p-3 border rounded-xl">
                <button @click="login" class="w-full bg-stone-900 text-white py-3 rounded-xl font-bold">Login</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div v-else>
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold">OTracker Dashboard</h1>
            <button @click="showCarModal = true" class="bg-stone-900 text-white px-6 py-2 rounded-xl font-bold">+ Vehicle</button>
        </header>

        <!-- METRICS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded-2xl border shadow-sm">
                <p class="text-stone-500 text-sm">Total Vehicles</p>
                <h2 class="text-3xl font-bold">{{ cars.length }}</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl border shadow-sm">
                <p class="text-stone-500 text-sm">Active Documents</p>
                <h2 class="text-3xl font-bold">{{ docs.length }}</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl border shadow-sm border-red-200">
                <p class="text-red-600 text-sm font-bold">Action Required</p>
                <h2 class="text-3xl font-bold text-red-600">{{ actionNeededCount }}</h2>
            </div>
        </div>

        <!-- LISTS -->
        <div class="grid gap-6">
            <div v-for="car in cars" :key="car.id" class="bg-white p-6 rounded-2xl border shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold">{{ car.name }} <span class="text-stone-400 text-sm">{{ car.plate_number }}</span></h3>
                    <div class="flex gap-2">
                        <button @click="prepareDoc(car.id)" class="text-sm bg-stone-100 px-3 py-1 rounded-lg">+ Add Doc</button>
                        <button @click="deleteCar(car.id)" class="text-sm text-red-500 font-bold">Delete</button>
                    </div>
                </div>
                <div v-for="doc in docs.filter(d => d.car_id === car.id)" :key="doc.id" 
                     :class="['p-3 rounded-lg mb-2 flex justify-between', isExpiring(doc.expiry_date) ? 'flash-red border border-red-200' : 'bg-stone-50']">
                    <span>{{ doc.type }} - {{ doc.expiry_date }}</span>
                    <button @click="deleteDoc(doc.id)" class="text-red-400 font-bold">×</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div v-if="showCarModal || showDocModal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm">
            <h3 class="font-bold mb-4">{{ showCarModal ? 'New Vehicle' : 'New Document' }}</h3>
            <input v-if="showCarModal" v-model="newCar.name" placeholder="Name" class="w-full p-3 mb-2 border rounded-xl">
            <input v-if="showCarModal" v-model="newCar.plate" placeholder="Plate" class="w-full p-3 mb-4 border rounded-xl">
            <input v-if="showDocModal" v-model="newDoc.type" placeholder="Type" class="w-full p-3 mb-2 border rounded-xl">
            <input v-if="showDocModal" v-model="newDoc.expiry" type="date" class="w-full p-3 mb-4 border rounded-xl">
            <button @click="showCarModal ? addCar() : addDoc()" class="w-full bg-stone-900 text-white py-2 rounded-xl font-bold">Save</button>
        </div>
    </div>
</div>

<script>
    // FIX: Renamed 'supabase' to 'supabaseClient' to avoid naming conflicts
    const supabaseClient = window.supabase.createClient('YOUR_URL', 'YOUR_KEY');
    const { createApp, ref, computed } = Vue;

    createApp({
        setup() {
            const user = ref(null);
            const phone = ref('');
            const password = ref('');
            const cars = ref([]);
            const docs = ref([]);
            const showCarModal = ref(false);
            const showDocModal = ref(false);
            const activeCarId = ref(null);
            const newCar = ref({ name: '', plate: '' });
            const newDoc = ref({ type: '', expiry: '' });

            const login = async () => {
                const { data } = await supabaseClient.from('users').select('*').eq('phone_number', phone.value).eq('password', password.value).single();
                if (data) { user.value = data; loadData(); }
            };

            const loadData = async () => {
                const { data: c } = await supabaseClient.from('cars').select('*').eq('owner_id', user.value.id);
                cars.value = c || [];
                const { data: d } = await supabaseClient.from('documents').select('*');
                docs.value = d || [];
            };

            const addCar = async () => {
                await supabaseClient.from('cars').insert({ owner_id: user.value.id, name: newCar.value.name, plate_number: newCar.value.plate });
                showCarModal.value = false; loadData();
            };

            const addDoc = async () => {
                await supabaseClient.from('documents').insert({ car_id: activeCarId.value, type: newDoc.value.type, expiry_date: newDoc.value.expiry });
                showDocModal.value = false; loadData();
            };

            const prepareDoc = (id) => { activeCarId.value = id; showDocModal.value = true; };
            
            const isExpiring = (date) => {
                const diff = new Date(date) - new Date();
                return diff < (30 * 24 * 60 * 60 * 1000);
            };

            const actionNeededCount = computed(() => docs.value.filter(d => isExpiring(d.expiry_date)).length);

            const deleteCar = async (id) => { await supabaseClient.from('cars').delete().eq('id', id); loadData(); };
            const deleteDoc = async (id) => { await supabaseClient.from('documents').delete().eq('id', id); loadData(); };

            return { user, phone, password, cars, docs, showCarModal, showDocModal, newCar, newDoc, login, addCar, addDoc, prepareDoc, isExpiring, actionNeededCount, deleteCar, deleteDoc };
        }
    }).mount('#app');
</script>
</body>
</html>
